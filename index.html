<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pokémon Daily Tournament</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f5f0dc;
  --dark: #1a1a2e;
  --border: #3d3d5c;
  --green-hp: #38d980;
  --yellow-hp: #f5c518;
  --red-hp: #f54242;
  --btn-bg: #eae4cc;
  --btn-border: #7b6f50;
  --blue-accent: #4a9eff;
  --purple-accent: #a855f7;
  --gold: #f5c518;
  --shadow: rgba(0,0,0,0.6);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d0d1a;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(74,158,255,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(168,85,247,0.06) 0%, transparent 50%);
  font-family: 'Press Start 2P', monospace;
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 10px 40px;
}

/* ─── HEADER ─── */
#header { text-align: center; margin-bottom: 12px; }
#header h1 {
  font-size: 13px; letter-spacing: 2px; color: var(--gold);
  text-shadow: 0 0 20px rgba(245,197,24,0.5), 2px 2px 0 #7a6010;
  margin-bottom: 6px;
}
#header .subtitle { font-size: 7px; color: #6b7aa1; letter-spacing: 3px; }
#score-display { margin-top: 8px; font-size: 8px; color: var(--blue-accent); text-shadow: 0 0 10px rgba(74,158,255,0.4); }

/* ─── TOURNAMENT BAR ─── */
#tournament-bar { display: flex; gap: 6px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }
.battle-pip {
  width: 26px; height: 26px; border: 2px solid #3d3d5c; border-radius: 50%;
  background: #1a1a2e; display: flex; align-items: center; justify-content: center;
  font-size: 8px; transition: all 0.4s; position: relative;
}
.battle-pip.won  { background: var(--gold); border-color: #d4a800; box-shadow: 0 0 12px rgba(245,197,24,0.6); }
.battle-pip.lost { background: var(--red-hp); border-color: #c03030; }
.battle-pip.current { border-color: var(--blue-accent); box-shadow: 0 0 10px rgba(74,158,255,0.5); animation: pulse-pip 1.5s infinite; }
.battle-pip.boss { border-color: var(--purple-accent) !important; }
.battle-pip.boss.current { box-shadow: 0 0 14px rgba(168,85,247,0.7); animation: pulse-boss 1.5s infinite; }
@keyframes pulse-pip {
  0%,100% { box-shadow: 0 0 10px rgba(74,158,255,0.5); }
  50%      { box-shadow: 0 0 22px rgba(74,158,255,0.9); }
}
@keyframes pulse-boss {
  0%,100% { box-shadow: 0 0 12px rgba(168,85,247,0.6); }
  50%      { box-shadow: 0 0 24px rgba(168,85,247,1); }
}
.battle-label { font-size: 7px; color: #6b7aa1; margin: 0 4px; }
#boss-label { font-size: 6px; color: var(--purple-accent); animation: pulse-pip 2s infinite; }

/* ─── GAME BOY SHELL ─── */
#gameboy {
  width: 100%; max-width: 440px;
  background: linear-gradient(145deg, #2e2e45 0%, #1e1e32 100%);
  border: 3px solid #3d3d5c;
  border-radius: 12px 12px 40px 12px;
  box-shadow: 0 0 0 1px #1a1a2e, 0 24px 70px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,255,255,0.07);
  overflow: hidden;
  position: relative;
}

/* ─── SCREEN ─── */
#screen {
  background: #1a2634; margin: 12px;
  border-radius: 6px; border: 3px solid #0a0a0a;
  box-shadow: inset 0 0 24px rgba(0,0,0,0.6), 0 0 30px rgba(74,158,255,0.12);
  overflow: hidden; position: relative;
}
/* CRT scanlines */
#screen::before {
  content: '';
  position: absolute; inset: 0; z-index: 500; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
  );
}
/* CRT vignette */
#screen::after {
  content: '';
  position: absolute; inset: 0; z-index: 501; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
}

/* ─── ARENA ─── */
#arena {
  height: 224px; position: relative;
  background: linear-gradient(180deg, #1a3a5c 0%, #2a5580 30%, #3a6f9a 55%, #4a8ab8 55.5%, #5a9fd0 61%, #6ab5e8 66%);
  overflow: hidden; transition: background 1.2s ease;
}
#arena::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 72px;
  background: linear-gradient(180deg, #2d5a1e 0%, #3a7428 30%, #4a8f35 60%, #5aad42 100%);
  border-top: 3px solid #1f3d15; transition: background 1.2s;
}
/* ground platform for player/enemy */
#platform-enemy {
  position: absolute; right: 30px; top: 105px;
  width: 80px; height: 16px; z-index: 4;
  background: radial-gradient(ellipse, rgba(0,0,0,0.3) 0%, transparent 70%);
  border-radius: 50%;
}
#platform-player {
  position: absolute; left: 16px; bottom: 70px;
  width: 80px; height: 18px; z-index: 4;
  background: radial-gradient(ellipse, rgba(0,0,0,0.25) 0%, transparent 70%);
  border-radius: 50%;
}
.cloud {
  position: absolute; background: rgba(255,255,255,0.15);
  border-radius: 20px; animation: drift linear infinite;
}
@keyframes drift {
  from { transform: translateX(-120px); }
  to   { transform: translateX(calc(440px + 120px)); }
}

/* ─── WEATHER OVERLAY ─── */
#weather-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }
#weather-badge {
  position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px; padding: 3px 8px; font-size: 5px; color: white;
  z-index: 20; white-space: nowrap; display: none;
}
#weather-badge.show { display: block; animation: bounce-in 0.35s cubic-bezier(0.34,1.56,0.64,1); }

.rain-drop {
  position: absolute; width: 1.5px; border-radius: 1px;
  background: linear-gradient(to bottom, transparent, rgba(120,190,255,0.75));
  animation: rain-fall linear infinite; top: -40px;
}
@keyframes rain-fall { to { transform: translateY(300px) translateX(-15px); } }

.sun-ray {
  position: absolute; top: 0; left: 50%;
  width: 2px; transform-origin: top center;
  background: linear-gradient(to bottom, rgba(255,220,50,0.45), transparent);
  animation: ray-pulse 2.2s ease-in-out infinite;
}
@keyframes ray-pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 0.9; } }

.sand-particle {
  position: absolute; border-radius: 50%;
  background: rgba(200,150,60,0.65);
  animation: sand-blow linear infinite;
}
@keyframes sand-blow {
  from { transform: translateX(-20px) translateY(0); opacity: 0.8; }
  to   { transform: translateX(460px) translateY(var(--sdrift)); opacity: 0; }
}

.hail-particle {
  position: absolute; border-radius: 50%;
  background: rgba(210,245,255,0.85);
  animation: hail-fall linear infinite; top: -10px;
  box-shadow: 0 0 3px rgba(150,230,255,0.5);
}
@keyframes hail-fall { to { transform: translateY(280px) translateX(var(--hdrift)); opacity: 0.2; } }

.fog-layer {
  position: absolute; inset: 0;
  background: rgba(140,165,200,0.12);
  animation: fog-drift 4s ease-in-out infinite alternate;
}
@keyframes fog-drift { from { opacity: 0.08; } to { opacity: 0.22; } }

/* Weather arena tints */
#arena.weather-sun  { background: linear-gradient(180deg, #3a4010 0%, #6a7020 30%, #8a9030 55%, #9aaa40 55.5%, #aaba55 61%, #baca68 66%) !important; }
#arena.weather-rain { background: linear-gradient(180deg, #141826 0%, #1e2838 30%, #283848 55%, #3a4858 55.5%, #485868 61%, #566878 66%) !important; }
#arena.weather-sandstorm { background: linear-gradient(180deg, #3a2810 0%, #5a4018 30%, #7a5828 55%, #8a6834 55.5%, #9a7840 61%, #aa8850 66%) !important; }
#arena.weather-hail { background: linear-gradient(180deg, #0e2030 0%, #1a2c3e 30%, #26384a 55%, #324456 55.5%, #3e5060 61%, #4a5c6e 66%) !important; }

/* ─── POKEMON CONTAINERS ─── */
.poke-wrap { position: absolute; z-index: 10; transition: all 0.3s ease; }
#wrap-enemy  { top: 8px; right: 12px; text-align: right; }
#wrap-player { bottom: 8px; left: 8px; z-index: 11; }

/* ─── HP BOX ─── */
.hpbox {
  background: var(--cream); color: #1a1a2e;
  padding: 5px 8px 6px;
  border: 2px solid #7b6f50; border-radius: 6px;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.45);
  min-width: 156px;
}
#wrap-enemy .hpbox  { margin-bottom: 4px; }
#wrap-player .hpbox { margin-top: 4px; }
.hpbox-name {
  font-size: 7px; font-weight: bold;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 4px; gap: 4px;
}
.poke-name { letter-spacing: 0.5px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.poke-level { font-size: 5px; color: #5a5040; flex-shrink: 0; }
.type-badges { display: flex; gap: 2px; flex-shrink: 0; }
.poke-type-badge {
  font-size: 5px; padding: 2px 4px; border-radius: 3px;
  text-transform: uppercase; color: white; font-weight: bold; letter-spacing: 0.5px;
}
.hp-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.hp-label   { font-size: 6px; color: #5a5040; }
.hp-numbers { font-size: 6px; color: #1a1a2e; }
.hpbar-track { background: #c8bfa8; height: 8px; border-radius: 4px; overflow: hidden; border: 1px solid #a09070; }
.hpbar-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.45s ease, background 0.45s ease;
  position: relative;
}
.hpbar-fill::after {
  content: ''; position: absolute; top: 1px; left: 2px; right: 2px; height: 2px;
  background: rgba(255,255,255,0.4); border-radius: 2px;
}
.status-badge { display: inline-block; font-size: 5px; padding: 1px 4px; border-radius: 3px; margin-left: 4px; vertical-align: middle; }
.status-psn { background: #a855f7; color: white; }
.status-brn { background: #f97316; color: white; }
.status-par { background: #eab308; color: #1a1a2e; }
.status-slp { background: #64748b; color: white; }
.status-frz { background: #67e8f9; color: #0e7490; }

/* ─── SPRITES ─── */
.sprite {
  image-rendering: pixelated; display: block;
  width: 96px !important; height: 96px !important; object-fit: contain;
  filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.5));
  transition: transform 0.3s ease, opacity 0.5s ease, filter 0.3s ease;
}

/* ─── TEXTBOX ─── */
#textbox-wrap {
  background: var(--cream); border-top: 3px solid #7b6f50;
  padding: 10px 14px; min-height: 64px;
  display: flex; align-items: center; position: relative; cursor: pointer;
  user-select: none;
}
#textbox-wrap::before {
  content: ''; position: absolute; top: -1px; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
}
#textbox {
  font-size: 9px; color: #1a1a2e; line-height: 1.85;
  font-family: 'Press Start 2P', monospace; min-height: 36px; flex: 1;
}
#textbox-hint { font-size: 5px; color: #b09060; position: absolute; bottom: 4px; right: 8px; opacity: 0.7; }
#cursor {
  display: inline-block; width: 8px; height: 10px;
  background: #1a1a2e; margin-left: 3px;
  animation: blink-cursor 0.7s step-end infinite; vertical-align: middle;
}
@keyframes blink-cursor { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* ─── ACTION PANEL ─── */
#action-panel {
  background: #17172a; border-top: 3px solid #0a0a0a;
  padding: 8px; position: relative;
}
#speed-btn {
  font-family: 'Press Start 2P', monospace; font-size: 5px;
  position: absolute; top: 4px; right: 4px; z-index: 10;
  background: #2d2d4a; color: #6b7aa1; border: 1px solid #3d3d5c;
  border-radius: 3px; padding: 3px 5px; cursor: pointer; transition: all 0.15s;
}
#speed-btn:hover { background: #3d3d6a; color: #94a3b8; }
#speed-btn.fast { background: var(--gold); color: #1a1a2e; border-color: #d4a800; }

#main-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.action-btn {
  padding: 10px 4px; border: 2px solid #4d4d7c; background: #22223a;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  cursor: pointer; border-radius: 5px; color: #e2e8f0;
  transition: all 0.15s; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.action-btn:hover:not(:disabled) {
  background: #303058; border-color: var(--blue-accent);
  transform: translateY(-1px); box-shadow: 0 3px 12px rgba(74,158,255,0.35);
}
.action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.action-btn .btn-icon { font-size: 14px; line-height: 1; }
.action-btn.btn-fight { border-color: #ef4444; }
.action-btn.btn-fight:hover:not(:disabled) { border-color: #ef4444; box-shadow: 0 3px 12px rgba(239,68,68,0.45); }
.action-btn.btn-bag { border-color: #f97316; }
.action-btn.btn-bag:hover:not(:disabled) { border-color: #f97316; box-shadow: 0 3px 12px rgba(249,115,22,0.45); }
.action-btn.btn-run { border-color: #64748b; }
.action-btn.btn-run:hover:not(:disabled) { border-color: #94a3b8; box-shadow: 0 3px 12px rgba(148,163,184,0.3); }

/* ─── MOVES SUBMENU ─── */
#moves-panel { display: none; }
#moves-panel.visible { display: block; }
#moves-header {
  font-size: 6px; color: var(--blue-accent); letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 6px; padding-left: 2px;
  display: flex; justify-content: space-between; align-items: center;
}
#moves { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.move-btn {
  padding: 0; border: 2px solid var(--btn-border); background: var(--btn-bg);
  font-family: 'Press Start 2P', monospace; font-size: 6px; cursor: pointer;
  border-radius: 5px; text-align: left; color: #1a1a2e;
  transition: all 0.12s; position: relative; overflow: hidden;
  display: flex; flex-direction: column;
}
.move-type-bar { height: 4px; width: 100%; border-radius: 3px 3px 0 0; }
.move-btn-inner { padding: 5px 6px 5px; flex: 1; }
.move-btn:hover:not(:disabled) {
  background: #fff; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(74,158,255,0.3);
}
.move-btn:active:not(:disabled) { transform: translateY(1px); box-shadow: none; }
.move-btn:disabled { background: #c8c0a8; cursor: not-allowed; color: #7a7060; border-color: #a09080; }
.move-btn:disabled .move-type-bar { opacity: 0.4; }
.move-name { display: block; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.move-meta { display: flex; gap: 3px; align-items: center; flex-wrap: nowrap; }
.move-type-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.move-cat { font-size: 7px; }
.move-pp { font-size: 5px; color: #5a5040; }
.move-pp.low { color: #ef4444; }
.move-pow { font-size: 5px; color: #2a5580; }
.move-key { font-size: 5px; color: #a09070; margin-left: auto; }

.back-btn {
  font-family: 'Press Start 2P', monospace; font-size: 6px;
  padding: 4px 8px; background: #2d2d4a; color: #94a3b8;
  border: 1px solid #3d3d5c; border-radius: 3px;
  cursor: pointer; transition: all 0.1s;
}
.back-btn:hover { background: #3d3d6a; color: #e2e8f0; }

/* ─── BAG ─── */
#bag-panel { display: none; }
#bag-panel.visible { display: block; }
#bag-header {
  font-size: 6px; color: #f97316; letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 6px; padding-left: 2px;
  display: flex; justify-content: space-between; align-items: center;
}
#bag-items { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.item-btn {
  padding: 7px 6px; border: 2px solid #7b6030; background: #28180a;
  font-family: 'Press Start 2P', monospace; font-size: 6px; cursor: pointer;
  border-radius: 5px; text-align: left; color: #fde68a;
  transition: all 0.12s; display: flex; flex-direction: column; gap: 3px; line-height: 1.6;
}
.item-btn:hover:not(:disabled) { background: #382010; border-color: #f97316; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(249,115,22,0.35); }
.item-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.item-btn .item-icon { font-size: 12px; }
.item-btn .item-name { font-size: 6px; color: #fde68a; }
.item-btn .item-count { font-size: 5px; color: #f97316; }
.item-btn .item-desc  { font-size: 5px; color: #b08040; }

/* ─── TYPE COLORS ─── */
.type-normal   { background: #a0a0a0; }
.type-fire     { background: #f08030; }
.type-water    { background: #6890f0; }
.type-grass    { background: #78c850; }
.type-electric { background: #f8d030; }
.type-ice      { background: #98d8d8; }
.type-fighting { background: #c03028; }
.type-ground   { background: #e0c068; }
.type-flying   { background: #a890f0; }
.type-psychic  { background: #f85888; }
.type-bug      { background: #a8b820; }
.type-rock     { background: #b8a038; }
.type-ghost    { background: #705898; }
.type-dragon   { background: #7038f8; }
.type-dark     { background: #705848; }
.type-steel    { background: #b8b8d0; }
.type-poison   { background: #a040a0; }
.type-fairy    { background: #ee99ac; }

/* ─── BOTTOM BAR ─── */
#bottom-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 14px 12px; background: #1c1c2e; border-top: 2px solid #0a0a0a;
}
.dpad {
  display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr;
  gap: 1px; width: 42px; height: 42px; opacity: 0.25;
}
.dpad > div { background: #3d3d5c; border-radius: 2px; }
.dpad > div:nth-child(2),.dpad > div:nth-child(4),
.dpad > div:nth-child(6),.dpad > div:nth-child(8) { background: #4d4d6c; }
.ab-buttons { display: flex; gap: 6px; opacity: 0.25; }
.ab-btn { width: 18px; height: 18px; border-radius: 50%; background: #8b2252; border: 2px solid #5a1535; }
.ab-btn:last-child { background: #1a4f8b; border-color: #0f3060; }
.kb-hints { font-size: 5px; color: #3d3d5c; text-align: center; line-height: 1.9; }

/* ─── BATTLE ANIMATIONS ─── */
@keyframes shake-x {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); } 40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); } 80% { transform: translateX(5px); }
}
@keyframes flash-white {
  0%,100% { filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.5)); }
  50%      { filter: drop-shadow(0 0 24px white) brightness(10); }
}
@keyframes faint-fall { to { transform: translateY(65px) rotate(15deg); opacity: 0; } }
@keyframes enter-slide-right { from { transform: translateX(90px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes enter-slide-left  { from { transform: translateX(-90px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes bounce-in {
  0% { transform: scale(0.4); opacity: 0; }
  60% { transform: scale(1.12); opacity: 1; }
  100% { transform: scale(1); }
}
@keyframes attack-lunge-right { 0% { transform: translateX(0); } 40% { transform: translateX(34px); } 100% { transform: translateX(0); } }
@keyframes attack-lunge-left  { 0% { transform: translateX(0); } 40% { transform: translateX(-34px); } 100% { transform: translateX(0); } }
@keyframes hit-flash { 0%,100% { opacity: 1; } 25%,75% { opacity: 0; } 50% { opacity: 0.25; } }
@keyframes status-pulse {
  0%,100% { filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.5)); }
  50%      { filter: drop-shadow(0 0 16px rgba(168,85,247,0.85)); }
}
@keyframes float  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@keyframes heal-glow {
  0%,100% { filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.5)); }
  50%      { filter: drop-shadow(0 0 18px rgba(56,217,128,0.95)); }
}
@keyframes crit-glow {
  0%,100% { filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.5)); }
  50%      { filter: drop-shadow(0 0 18px rgba(255,80,80,0.9)) brightness(1.4); }
}
@keyframes screen-shake {
  0%,100% { transform: none; }
  10%  { transform: translate(-5px, 2px); } 20% { transform: translate(5px,-2px); }
  30%  { transform: translate(-4px, 3px); } 40% { transform: translate(4px,-1px); }
  50%  { transform: translate(-2px, 2px); } 60% { transform: translate(3px,-2px); }
  70%  { transform: translate(-1px, 1px); }
}
@keyframes boss-enter {
  0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
  50%  { transform: scale(1.3) rotate(5deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); }
}

.anim-enter-enemy  { animation: enter-slide-right 0.5s ease forwards; }
.anim-enter-player { animation: enter-slide-left  0.5s ease forwards; }
.anim-bounce       { animation: bounce-in 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.anim-hit          { animation: hit-flash 0.15s 3; }
.anim-attack-p     { animation: attack-lunge-right 0.3s ease; }
.anim-attack-e     { animation: attack-lunge-left  0.3s ease; }
.anim-faint        { animation: faint-fall 0.6s ease forwards; }
.anim-status       { animation: status-pulse 0.5s 4; }
.anim-float        { animation: float 2.2s ease-in-out infinite; }
.anim-heal         { animation: heal-glow 0.45s 3; }
.anim-crit         { animation: crit-glow 0.2s 3; }
.anim-boss-enter   { animation: boss-enter 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.screen-shake      { animation: screen-shake 0.45s ease; }

/* ─── DAMAGE POPUP ─── */
.dmg-popup {
  position: absolute; font-size: 10px; font-weight: bold; font-family: 'Press Start 2P', monospace;
  color: white; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
  pointer-events: none; animation: dmg-float 1.3s ease forwards; z-index: 50;
}
.dmg-popup.super    { color: #ffe040; font-size: 13px; }
.dmg-popup.not-very { color: #94a3b8; font-size: 8px; }
.dmg-popup.heal     { color: #38d980; }
.dmg-popup.crit     { color: #ff6060; font-size: 12px; }
@keyframes dmg-float {
  0%   { transform: translateY(0); opacity: 1; }
  70%  { transform: translateY(-32px); opacity: 1; }
  100% { transform: translateY(-48px); opacity: 0; }
}

/* ─── EFFECT BANNER ─── */
#effect-banner {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: rgba(0,0,0,0.88); color: white;
  padding: 6px 14px; border-radius: 20px; font-size: 7px;
  white-space: nowrap; z-index: 100;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
  border: 2px solid rgba(255,255,255,0.2); pointer-events: none;
}
#effect-banner.show { transform: translate(-50%, -50%) scale(1); }

/* ─── SCREEN FLASH ─── */
#screen-flash {
  position: absolute; inset: 0; pointer-events: none; z-index: 200;
  opacity: 0; transition: opacity 0.06s; border-radius: 4px;
}
#screen-flash.active { opacity: 1; }

/* ─── LOADING ─── */
#loading-overlay {
  position: fixed; inset: 0; background: #0d0d1a;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 999; transition: opacity 0.5s;
}
.loading-ball {
  width: 60px; height: 60px; border-radius: 50%;
  background: conic-gradient(#ef4444 0deg 180deg, white 180deg 360deg);
  border: 4px solid #1a1a2e;
  box-shadow: 0 0 0 3px #ef4444, 0 12px 36px rgba(239,68,68,0.45);
  animation: spin-ball 0.85s linear infinite; position: relative;
}
.loading-ball::after {
  content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 3px;
  background: #1a1a2e; transform: translateY(-50%);
}
.loading-ball::before {
  content: ''; position: absolute; top: 50%; left: 50%;
  width: 12px; height: 12px; background: white; border: 2px solid #1a1a2e;
  border-radius: 50%; transform: translate(-50%, -50%); z-index: 1;
}
@keyframes spin-ball { to { transform: rotate(360deg); } }
#loading-text {
  margin-top: 18px; font-size: 8px; color: #6b7aa1; letter-spacing: 2px;
  animation: fade-text 0.8s ease-in-out infinite alternate;
}
@keyframes fade-text { from { opacity: 0.35; } to { opacity: 1; } }

/* ─── WIN/LOSE PER-BATTLE OVERLAY ─── */
#result-overlay {
  display: none; position: absolute; inset: 0;
  background: rgba(0,0,0,0.72); backdrop-filter: blur(3px);
  z-index: 202; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px;
}
#result-overlay.show { display: flex; }
#result-title { font-size: 15px; text-shadow: 2px 2px 0 rgba(0,0,0,0.5); animation: bounce-in 0.4s cubic-bezier(0.34,1.56,0.64,1); }
#result-sub { font-size: 7px; color: #cbd5e1; text-align: center; line-height: 2.2; }
#result-score { font-size: 9px; color: var(--gold); text-shadow: 0 0 12px rgba(245,197,24,0.6); }
#result-btn {
  font-family: 'Press Start 2P', monospace; font-size: 8px;
  padding: 10px 20px; background: var(--gold); color: #1a1a2e;
  border: 3px solid #d4a800; border-radius: 5px;
  cursor: pointer; animation: pulse-pip 1.5s infinite; margin-top: 4px;
}

/* ─── FINAL SCORE OVERLAY ─── */
#final-overlay {
  display: none; position: absolute; inset: 0;
  background: rgba(0,0,0,0.93); backdrop-filter: blur(5px);
  z-index: 205; align-items: center; justify-content: center;
  flex-direction: column; gap: 7px; padding: 14px;
  overflow-y: auto;
}
#final-overlay.show { display: flex; }
.final-title { font-size: 13px; text-shadow: 2px 2px 0 rgba(0,0,0,0.5); animation: bounce-in 0.5s cubic-bezier(0.34,1.56,0.64,1); }
.final-stars { font-size: 20px; letter-spacing: 5px; }
.final-score-label { font-size: 6px; color: #6b7aa1; margin-top: 2px; }
.final-score-big { font-size: 12px; color: white; text-shadow: 0 0 16px rgba(74,158,255,0.5); }
.final-divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, #3d3d5c, transparent); margin: 4px 0; }
.final-stat-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 6px; color: #cbd5e1; gap: 12px; width: 100%; padding: 0 8px;
}
.final-stat-row .won-mark  { color: #38d980; }
.final-stat-row .lost-mark { color: var(--red-hp); }
.final-hall { font-size: 5px; color: var(--purple-accent); text-align: center; line-height: 2; margin-top: 2px; }
#final-btn {
  font-family: 'Press Start 2P', monospace; font-size: 8px;
  padding: 10px 22px; background: var(--gold); color: #1a1a2e;
  border: 3px solid #d4a800; border-radius: 5px; cursor: pointer;
  margin-top: 6px; animation: pulse-pip 1.5s infinite;
}

/* ─── ITEM USE ANIMATION ─── */
@keyframes item-use-pop {
  0% { transform: scale(0) translateX(-50%); opacity: 0; }
  60% { transform: scale(1.2) translateX(-50%); opacity: 1; }
  100% { transform: scale(1) translateX(-50%); opacity: 1; }
}
.item-use-bubble {
  position: absolute; top: 38%; left: 50%;
  background: rgba(249,115,22,0.92);
  color: white; padding: 6px 14px; border-radius: 14px;
  font-size: 8px; z-index: 100;
  animation: item-use-pop 0.35s ease forwards;
  pointer-events: none; text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
  white-space: nowrap;
}

/* ─── BATTLE WIPE TRANSITION ─── */
#battle-wipe {
  position: absolute; inset: 0; background: #0d0d1a; z-index: 300;
  pointer-events: none; transform: scaleX(0); transform-origin: left;
}
#battle-wipe.wipe-in  { animation: wipe-in  0.28s ease forwards; }
#battle-wipe.wipe-out { animation: wipe-out 0.28s ease forwards; }
@keyframes wipe-in  { from { transform: scaleX(0); } to { transform: scaleX(1); } }
@keyframes wipe-out { from { transform: scaleX(1); } to { transform: scaleX(0); } }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3d3d5c; border-radius: 2px; }
</style>
</head>
<body>

</div>

<div id="header">

        </button>

          <span>⚔ GOLPES</span>

    <div class="ab-buttons">
      <div class="ab-btn"></div>
      <div class="ab-btn"></div>
    </div>

<script>
// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let p1, p2;
let playerTurn = false;
let battleNumber = 1;
const maxBattles = 5;
let tournamentOver = false;
let resultAction = null;
let currentPanel = 'main';
let currentWeather = 'none';
let totalScore = 0;
let battleScores = [];
let hallOfFame = [];
let speedMult = 1;
let textSkip = false;

// Boss battle = battle 5
const isBoss = () => battleNumber === maxBattles;

// Difficulty per battle (stat multiplier for enemy)
const diffMult  = [0.62, 0.78, 0.95, 1.12, 1.38];
const enemyLvls = [  28,   36,  45,   54,   68 ];
const PLAYER_LVL = 50;

const sleep = ms => new Promise(r => setTimeout(r, Math.max(20, Math.round(ms / speedMult))));
const cap   = s => s.charAt(0).toUpperCase() + s.slice(1).replace(/-/g, ' ');
const rng   = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;

// ═══════════════════════════════════════
//  SPEED TOGGLE
// ═══════════════════════════════════════
function toggleSpeed() {
  speedMult = speedMult === 1 ? 3 : 1;
  const btn = document.getElementById('speed-btn');
  btn.textContent = speedMult + '×';
  btn.classList.toggle('fast', speedMult > 1);
}

// ═══════════════════════════════════════
//  SCORE
// ═══════════════════════════════════════
function addScore(n) {
  totalScore += n;
  document.getElementById('score-val').textContent = totalScore;
}
function calcBattleScore() {
  const hpBonus   = Math.floor((p1.hp / p1.maxHp) * 600);
  const diffBonus = Math.floor(diffMult[Math.min(battleNumber-1, diffMult.length-1)] * 300);
  const bossBonus = isBoss() ? 500 : 0;
  return 500 + hpBonus + diffBonus + bossBonus;
}

// ═══════════════════════════════════════
//  TEXT SKIP
// ═══════════════════════════════════════
function onTextboxClick() { textSkip = true; }

// ═══════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'z' || k === ' ' || k === 'enter') { textSkip = true; e.preventDefault(); }
  if ((k === 'x' || k === 'escape') && currentPanel !== 'main' && playerTurn) { showMainMenu(); e.preventDefault(); }
  if (['1','2','3','4'].includes(k) && playerTurn && currentPanel === 'moves') {
    const btn = document.querySelectorAll('.move-btn')[parseInt(k)-1];
    if (btn && !btn.disabled) btn.click();
  }
  if (k === 'f' && playerTurn && currentPanel === 'main') document.getElementById('btn-fight').click();
  if (k === 'b' && playerTurn && currentPanel === 'main') document.getElementById('btn-bag').click();
  if (k === 'r' && playerTurn && currentPanel === 'main') document.getElementById('btn-run').click();
  if (k === 's') toggleSpeed();
});

// ═══════════════════════════════════════
//  WEATHER
// ═══════════════════════════════════════
const WEATHERS   = ['none','sun','rain','sandstorm','hail'];
const W_NAMES    = { none:null, sun:'☀️ LUZ DO SOL', rain:'🌧️ CHUVA', sandstorm:'🌪️ TEMPESTADE AREIA', hail:'❄️ GRANIZO' };
const W_COLORS   = { sun:'#f5c518', rain:'#6890f0', sandstorm:'#d4a050', hail:'#98d8d8' };
const W_IMMUNE   = { sandstorm:['rock','ground','steel'], hail:['ice'] };

function setWeather(type) {
  currentWeather = type;
  const overlay = document.getElementById('weather-overlay');
  const arena   = document.getElementById('arena');
  const badge   = document.getElementById('weather-badge');
  overlay.innerHTML = '';
  WEATHERS.forEach(w => arena.classList.remove(`weather-${w}`));
  if (type === 'none') { badge.classList.remove('show'); return; }
  arena.classList.add(`weather-${type}`);
  badge.textContent = W_NAMES[type];
  badge.style.color        = W_COLORS[type] || 'white';
  badge.style.borderColor  = W_COLORS[type] || 'rgba(255,255,255,0.2)';
  badge.classList.add('show');

  if (type === 'rain') {
    for (let i = 0; i < 22; i++) {
      const d = document.createElement('div');
      d.className = 'rain-drop';
      d.style.cssText = `left:${Math.random()*105}%;height:${rng(9,18)}px;animation-duration:${(Math.random()*0.4+0.55).toFixed(2)}s;animation-delay:${(Math.random()*0.9).toFixed(2)}s;opacity:${(Math.random()*0.45+0.3).toFixed(2)}`;
      overlay.appendChild(d);
    }
  } else if (type === 'sun') {
    const sun = document.createElement('div');
    sun.style.cssText = 'position:absolute;top:6px;right:14px;width:24px;height:24px;border-radius:50%;background:rgba(255,220,60,0.55);box-shadow:0 0 14px rgba(255,220,60,0.65);animation:ray-pulse 2s ease-in-out infinite';
    overlay.appendChild(sun);
    for (let i = 0; i < 8; i++) {
      const r = document.createElement('div');
      r.className = 'sun-ray';
      r.style.cssText = `transform:rotate(${i*45}deg);animation-delay:${(i*0.28).toFixed(2)}s;height:${rng(45,75)}px`;
      overlay.appendChild(r);
    }
  } else if (type === 'sandstorm') {
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'sand-particle';
      const sz = rng(2,5);
      p.style.cssText = `top:${Math.random()*85}%;width:${sz}px;height:${sz}px;animation-duration:${(Math.random()*1.4+0.7).toFixed(2)}s;animation-delay:${(Math.random()*1.6).toFixed(2)}s;--sdrift:${rng(-30,50)}px`;
      overlay.appendChild(p);
    }
  } else if (type === 'hail') {
    for (let i = 0; i < 18; i++) {
      const h = document.createElement('div');
      h.className = 'hail-particle';
      const sz = rng(3,5);
      h.style.cssText = `left:${Math.random()*105}%;width:${sz}px;height:${sz}px;animation-duration:${(Math.random()*0.55+0.55).toFixed(2)}s;animation-delay:${(Math.random()*0.9).toFixed(2)}s;--hdrift:${rng(-12,12)}px`;
      overlay.appendChild(h);
    }
    const fog = document.createElement('div');
    fog.className = 'fog-layer';
    overlay.appendChild(fog);
  }
}

function weatherDmgMod(mType) {
  if (currentWeather === 'sun') { if (mType === 'fire') return 1.5; if (mType === 'water') return 0.5; }
  if (currentWeather === 'rain') { if (mType === 'water') return 1.5; if (mType === 'fire') return 0.5; }
  return 1;
}

async function applyWeatherDamage(poke, idx) {
  if (currentWeather === 'none') return false;
  const immune = W_IMMUNE[currentWeather];
  if (!immune || poke.types.some(t => immune.includes(t))) return false;
  const dmg = Math.max(1, Math.floor(poke.maxHp / 16));
  poke.hp -= dmg; updateHP(poke, idx);
  spawnDmgPopup(`sprite${idx}`, dmg, 'not-very');
  const msgs = { sandstorm: `${poke.name} açoitado pela areia!`, hail: `${poke.name} ferido pelo granizo!` };
  await log(msgs[currentWeather] || '', 900);
  if (poke.hp <= 0) return true;
  return false;
}

// ═══════════════════════════════════════
//  BAG
// ═══════════════════════════════════════
const bagItems = [
  { id:'potion',     name:'Poção',       icon:'🧪', count:3, heal:20,  desc:'Cura 20 HP',       type:'heal'    },
  { id:'superpotion',name:'Super Poção', icon:'💊', count:2, heal:50,  desc:'Cura 50 HP',       type:'heal'    },
  { id:'hyper',      name:'Hiper Poção', icon:'💉', count:1, heal:120, desc:'Cura 120 HP',      type:'heal'    },
  { id:'fullheal',   name:'Cura Total',  icon:'✨', count:1, heal:0,   desc:'Remove status',    type:'status'  },
  { id:'antidote',   name:'Antídoto',    icon:'🌿', count:2, heal:0,   desc:'Cura veneno',      type:'antidote'},
  { id:'xattack',    name:'X Ataque',    icon:'⬆️', count:2, heal:0,   desc:'+50% ATK',         type:'xattack' },
];

function renderBag() {
  const div = document.getElementById('bag-items');
  div.innerHTML = '';
  bagItems.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = 'item-btn';
    btn.disabled = item.count <= 0;
    btn.innerHTML = `
      <span class="item-icon">${item.icon}</span>
      <span class="item-name">${item.name}</span>
      <span class="item-count">x${item.count}</span>
      <span class="item-desc">${item.desc}</span>`;
    btn.onclick = () => useItem(i);
    div.appendChild(btn);
  });
}

async function useItem(idx) {
  if (!playerTurn || tournamentOver) return;
  const item = bagItems[idx];
  if (item.count <= 0) return;
  item.count--;
  playerTurn = false;
  toggleMainActions(false);
  showMainMenu();
  const bubble = document.createElement('div');
  bubble.className = 'item-use-bubble';
  bubble.textContent = `${item.icon} ${item.name}!`;
  document.getElementById('arena').appendChild(bubble);
  await sleep(720);
  bubble.remove();
  const s1 = document.getElementById('sprite1');
  if (item.type === 'heal') {
    const before = p1.hp;
    p1.hp = Math.min(p1.maxHp, p1.hp + item.heal);
    const got = p1.hp - before;
    s1.classList.add('anim-heal');
    await sleep(750); s1.classList.remove('anim-heal');
    updateHP(p1, 1);
    spawnDmgPopup('sprite1', got, 'heal');
    await log(`${p1.name} recuperou ${got} HP!`);
  } else if (item.type === 'status') {
    if (p1.status && p1.status !== 'none') {
      p1.status = null; updateStatusBadge(p1, 1);
      s1.classList.add('anim-heal'); await sleep(600); s1.classList.remove('anim-heal');
      await log(`Status de ${p1.name} curado!`);
    } else { await log(`${p1.name} não tem status!`); item.count++; }
  } else if (item.type === 'antidote') {
    if (p1.status === 'poison' || p1.status === 'toxic') {
      p1.status = null; updateStatusBadge(p1, 1);
      await log(`${p1.name} curado do veneno!`);
    } else { await log(`${p1.name} não está envenenado!`); item.count++; }
  } else if (item.type === 'xattack') {
    p1.atkBoost = (p1.atkBoost || 1) * 1.5;
    s1.classList.add('anim-heal'); await sleep(600); s1.classList.remove('anim-heal');
    await log(`Ataque de ${p1.name} subiu!`);
  }
  // enemy's turn
  const eMove = enemyAI();
  const skip2 = await applyStatusDamage(p2, 2);
  if (p2.hp > 0 && !skip2) {
    await executeMove(p2, p1, eMove, 2, 1);
    if (await endCheck()) return;
  }
  if (await applyWeatherDamage(p1, 1)) { await endCheck(); return; }
  if (await applyWeatherDamage(p2, 2)) { await endCheck(); return; }
  await log(`O que ${p1.name} deve fazer?`, 800);
  playerTurn = true; toggleMainActions(true);
}

async function log(text, delay = 1600) {
  if (!text) { await sleep(delay); return; }
  document.getElementById('textbox').innerHTML = text + '<span id="cursor"></span>';
  textSkip = false;
  const t0 = Date.now(), d = Math.round(delay / speedMult);
  while (Date.now() - t0 < d) {
    if (textSkip) break;
    await new Promise(r => setTimeout(r, 40));
  }
  textSkip = false;
}

async function typeText(text, delay = 1600) {
  const box = document.getElementById('textbox');
  box.innerHTML = '<span id="cursor"></span>';
  textSkip = false;
  let current = '';
  for (const ch of text.split('')) {
    if (textSkip) { current = text; box.innerHTML = current + '<span id="cursor"></span>'; break; }
    current += ch;
    box.innerHTML = current + '<span id="cursor"></span>';
    await new Promise(r => setTimeout(r, Math.round(28 / speedMult)));
  }
  await log('', delay);
}

// ═══════════════════════════════════════
//  FETCH POKEMON (Gen I–III, IDs 1–386)
// ═══════════════════════════════════════
async function getPokemon(id, statMult = 1.0, level = 50) {
  const d = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r => r.json());
  const stats = {};
  d.stats.forEach(s => stats[s.stat.name] = s.base_stat);
  const allMoves = shuffle([...d.moves]);
  const moveData = [];
  for (const m of allMoves) {
    if (moveData.length >= 4) break;
    try {
      const md = await fetch(m.move.url).then(r => r.json());
      if (!md.power && md.damage_class?.name === 'status' && moveData.filter(x => !x.damage).length >= 1) continue;
      moveData.push({
        name: cap(md.name), power: md.power || 0,
        accuracy: md.accuracy ?? 100, type: md.type.name,
        pp: md.pp || 10, maxPP: md.pp || 10,
        damage: !!(md.power && md.power > 0),
        damageClass: md.damage_class?.name || 'physical',
        effect: md.meta?.ailment?.name || null,
        effectChance: md.meta?.ailment_chance || 100,
        heal: md.meta?.healing || 0, priority: md.priority || 0
      });
    } catch { continue; }
  }
  while (moveData.length < 4) moveData.push({
    name:'Tackle', power:40, accuracy:100, type:'normal', pp:35, maxPP:35,
    damage:true, damageClass:'physical', effect:null, effectChance:0, heal:0, priority:0
  });
  const hp = Math.floor((stats['hp'] * 2 + 10) * statMult);
  return {
    name: cap(d.name), rawName: d.name,
    type: d.types[0].type.name,
    types: d.types.map(t => t.type.name),
    hp, maxHp: hp,
    atk:   Math.floor(stats['attack']         * statMult),
    def:   Math.floor(stats['defense']        * statMult),
    spAtk: Math.floor(stats['special-attack'] * statMult),
    spDef: Math.floor(stats['special-defense']* statMult),
    speed: Math.floor(stats['speed']          * statMult),
    level, moves: moveData, status: null, statusTurns: 0,
    atkBoost: 1,
    spriteFront: `https://play.pokemonshowdown.com/sprites/ani/${d.name}.gif`,
    spriteBack:  `https://play.pokemonshowdown.com/sprites/ani-back/${d.name}.gif`,
    cry: `https://play.pokemonshowdown.com/audio/cries/${d.name}.mp3`,
    spriteId: null
  };
}

function updateStatusBadge(poke, idx) {

  if (!poke.status || poke.status === 'none') { b.style.display = 'none'; return; }
  const labels  = {poison:'PSN',burn:'BRN',paralysis:'PAR',sleep:'SLP',freeze:'FRZ',toxic:'PSN'};
  const classes = {poison:'status-psn',burn:'status-brn',paralysis:'status-par',sleep:'status-slp',freeze:'status-frz',toxic:'status-psn'};
  b.style.display = 'inline-block';

async function applyStatusDamage(poke, idx) {
  if (!poke.status || poke.status === 'none') return false;
  if (poke.status === 'sleep') {
    poke.statusTurns = (poke.statusTurns||0) + 1;
    if (poke.statusTurns >= rng(2,5)) {
      poke.status = null; updateStatusBadge(poke, idx);
      await log(`${poke.name} acordou!`);
    } else { await log(`${poke.name} está dormindo...`); return true; }
  }
  if (poke.status === 'freeze') {
    if (Math.random() < 0.2) {
      poke.status = null; updateStatusBadge(poke, idx);
      await log(`${poke.name} descongelou!`);
    } else { await log(`${poke.name} está congelado!`); return true; }
  }
  if (poke.status === 'paralysis' && Math.random() < 0.25) {
    await log(`${poke.name} paralisado e não consegue se mover!`); return true;
  }
  if (poke.status === 'poison' || poke.status === 'toxic') {
    const dmg = Math.floor(poke.maxHp / 8);
    poke.hp -= dmg; updateHP(poke, idx);
    spawnDmgPopup(idx===1?'sprite1':'sprite2', dmg, '');
    await log(`${poke.name} sofreu dano de veneno!`);
    if (poke.hp <= 0) return false;
  }
  if (poke.status === 'burn') {
    const dmg = Math.floor(poke.maxHp / 16);
    poke.hp -= dmg; updateHP(poke, idx);
    spawnDmgPopup(idx===1?'sprite1':'sprite2', dmg, '');
    await log(`${poke.name} sofreu dano de queimadura!`);
  }
  return false;
}

// ═══════════════════════════════════════
//  CALC DAMAGE
// ═══════════════════════════════════════
function calcDamage(atk, def, move) {
  const lvl     = atk.level || 50;
  const atkStat = move.damageClass === 'special' ? atk.spAtk : atk.atk;
  const defStat = move.damageClass === 'special' ? def.spDef : def.def;
  let dmg = Math.floor((((2*lvl/5+2) * move.power * atkStat/defStat) / 50) + 2);
  if (atk.types.includes(move.type)) dmg = Math.floor(dmg * 1.5); // STAB
  let eff = 1;
  for (const dt of (def.types || [def.type])) eff *= typeEff(move.type, dt);
  dmg = Math.floor(dmg * eff);
  if (atk.status === 'burn' && move.damageClass === 'physical') dmg = Math.floor(dmg * 0.5);
  if (move.damageClass !== 'special') dmg = Math.floor(dmg * (atk.atkBoost || 1));
  dmg = Math.floor(dmg * weatherDmgMod(move.type));
  dmg = Math.floor(dmg * rng(85,100)/100);
  const isCrit = Math.random() < 0.0625;
  if (isCrit) dmg = Math.floor(dmg * 1.5);
  return { dmg: Math.max(1, dmg), eff, isCrit };
}

// ═══════════════════════════════════════
//  EXECUTE MOVE
// ═══════════════════════════════════════
async function executeMove(attacker, defender, move, atkIdx, defIdx) {
  if (attacker.hp <= 0) return;
  const aSprite = document.getElementById(`sprite${atkIdx}`);
  const dSprite = document.getElementById(`sprite${defIdx}`);
  await log(`${attacker.name} usou ${move.name}!`);
  move.pp = Math.max(0, move.pp - 1);
  renderMoves();
  // accuracy
  let acc = move.accuracy || 100;
  if (currentWeather === 'rain' && move.name === 'Thunder') acc = 100;
  if (Math.random() * 100 > acc) { await log(`Ataque de ${attacker.name} errou!`, 1200); return; }
  try { new Audio(attacker.cry).play().catch(()=>{}); } catch {}
  aSprite.classList.add(atkIdx === 1 ? 'anim-attack-p' : 'anim-attack-e');
  await sleep(310);
  aSprite.classList.remove('anim-attack-p','anim-attack-e');

  if (move.damage && move.power > 0) {
    const { dmg, eff, isCrit } = calcDamage(attacker, defender, move);
    dSprite.classList.add('anim-hit');
    await sleep(480); dSprite.classList.remove('anim-hit');
    defender.hp -= dmg; updateHP(defender, defIdx);
    const cls = isCrit ? 'crit' : eff > 1 ? 'super' : eff < 1 ? 'not-very' : '';
    spawnDmgPopup(`sprite${defIdx}`, dmg, cls);
    if (eff === 0) {
      await showEffectBanner('NÃO AFETA...', '#64748b');
    } else if (eff >= 2) {
      await flashScreen('rgba(255,220,0,0.35)');
      document.getElementById('gameboy').classList.add('screen-shake');
      setTimeout(() => document.getElementById('gameboy').classList.remove('screen-shake'), 460);
      await showEffectBanner('SUPER EFETIVO!', '#f5c518');
    } else if (eff < 1) {
      await showEffectBanner('Pouco efetivo...', '#94a3b8');
    }
    if (isCrit) {
      dSprite.classList.add('anim-crit');
      setTimeout(() => dSprite.classList.remove('anim-crit'), 600);
      await flashScreen('rgba(255,80,80,0.3)');
      await log(`Acerto crítico!`, 900);
    }
  } else if (move.effect && move.effect !== 'none') {
    if (!defender.status || defender.status === 'none') {
      if (Math.random() * 100 <= (move.effectChance || 100)) {
        defender.status = move.effect; defender.statusTurns = 0;
        updateStatusBadge(defender, defIdx);
        dSprite.classList.add('anim-status');
        await sleep(1800); dSprite.classList.remove('anim-status');
        const msgs = {
          poison:`${defender.name} foi envenenado!`,burn:`${defender.name} em chamas!`,
          paralysis:`${defender.name} paralisado!`,sleep:`${defender.name} adormeceu!`,
          freeze:`${defender.name} congelado!`
        };
        await log(msgs[move.effect] || `${defender.name} sofreu efeito!`);
      } else { await log(`Sem efeito desta vez...`, 1000); }
    } else { await log(`${defender.name} já tem um status!`, 1000); }
  } else { await log(`Mas não aconteceu nada...`, 1000); }

  if (move.heal > 0) {
    const ha = Math.floor(attacker.maxHp * move.heal / 100);
    attacker.hp = Math.min(attacker.maxHp, attacker.hp + ha);
    updateHP(attacker, atkIdx);
    spawnDmgPopup(`sprite${atkIdx}`, ha, 'heal');
  }
}

// ═══════════════════════════════════════
//  ENEMY AI
// ═══════════════════════════════════════
function enemyAI() {
  const avail = p2.moves.filter(m => m.pp > 0);
  if (!avail.length) return { name:'Struggle',power:50,accuracy:100,type:'normal',damage:true,damageClass:'physical',pp:99,maxPP:99,effect:null,effectChance:0,heal:0,priority:0 };
  const p1HpPct = p1.hp / p1.maxHp;
  let best = avail[0], bestScore = -Infinity;
  for (const m of avail) {
    let score = 0;
    if (m.damage && m.power > 0) {
      let eff = 1;
      for (const t of p1.types) eff *= typeEff(m.type, t);
      score = m.power * eff * weatherDmgMod(m.type);
      if (p2.types.includes(m.type)) score *= 1.5;
      const estKO = score * p2.atk / 80;
      if (estKO >= p1.hp) score *= 2.2;
    } else if (m.effect && m.effect !== 'none' && (!p1.status || p1.status === 'none') && p1HpPct > 0.25) {
      score = m.effect === 'sleep' || m.effect === 'freeze' ? 110 : 70;
    } else if (m.heal > 0 && p2.hp < p2.maxHp * 0.35) {
      score = 95;
    }
    score += Math.random() * 22 - 11;
    if (score > bestScore) { bestScore = score; best = m; }
  }
  return best;
}

// ═══════════════════════════════════════
//  TURN
// ═══════════════════════════════════════
async function playTurn(moveIdx) {
  if (!playerTurn) return;
  playerTurn = false; toggleMainActions(false); showMainMenu();
  const pMove = p1.moves[moveIdx];
  if (!pMove || pMove.pp <= 0) {
    await log('Sem PP! Escolha outro golpe.', 1000);
    playerTurn = true; toggleMainActions(true); return;
  }
  const eMove  = enemyAI();
  const pFirst = pMove.priority > eMove.priority ||
                 (pMove.priority === eMove.priority && p1.speed >= p2.speed);
  const [first,fm,fi, second,sm,si] = pFirst
    ? [p1,pMove,1, p2,eMove,2]
    : [p2,eMove,2, p1,pMove,1];

  const skip1 = await applyStatusDamage(first, fi);
  if (first.hp <= 0) { await endCheck(); return; }
  if (!skip1) { await executeMove(first, second, fm, fi, si); if (await endCheck()) return; }
  const skip2 = await applyStatusDamage(second, si);
  if (second.hp <= 0) { await endCheck(); return; }
  if (!skip2) { await executeMove(second, first, sm, si, fi); if (await endCheck()) return; }

  // weather end of turn
  if (await applyWeatherDamage(p1,1)) { await endCheck(); return; }
  if (await applyWeatherDamage(p2,2)) { await endCheck(); return; }

  await log(`O que ${p1.name} deve fazer?`, 800);
  playerTurn = true; toggleMainActions(true);
}

async function endCheck() {
  if (p1.hp <= 0) {
    document.getElementById('sprite1').classList.add('anim-faint');
    await flashScreen('rgba(255,0,0,0.3)');
    await log(`${p1.name} desmaiou!`);
    await handleLoss(); return true;
  }
  if (p2.hp <= 0) {
    document.getElementById('sprite2').classList.add('anim-faint');
    await flashScreen('rgba(255,255,255,0.25)');
    await log(`${p2.name} inimigo desmaiou!`);
    await handleWin(); return true;
  }
  return false;
}

// ═══════════════════════════════════════
//  WIN / LOSS
// ═══════════════════════════════════════
async function handleWin() {
  const score = calcBattleScore();
  addScore(score);
  battleScores.push({ won:true, score, enemy:p2.name });
  hallOfFame.push(p2.name);
  saveTournament(true);
  battleNumber++;
  updateTournamentPips();
  if (battleNumber <= maxBattles) {
    showResult('🌟 VITÓRIA! 🌟',
      `Batalha ${battleNumber-1} vencida!\nPróxima: ${battleNumber===maxBattles?'BATALHA CHEFE!':'Batalha '+battleNumber}`,
      'PRÓXIMA BATALHA', 'next', `+${score} PTS`);
  } else {
    tournamentOver = true;
    showFinalScreen(true);
  }
}

async function handleLoss() {
  battleScores.push({ won:false, score:0, enemy:p2.name });
  saveTournament(false);
  tournamentOver = true;
  showFinalScreen(false);
}

function showResult(title, sub, btnText, action, scoreText='') {
  resultAction = action;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent   = sub;
  document.getElementById('result-btn').textContent   = btnText;
  document.getElementById('result-score').textContent = scoreText;
  document.getElementById('result-overlay').classList.add('show');
  document.getElementById('result-title').style.color = action === 'next' ? '#f5c518' : '#ef4444';
}
function hideResult() { document.getElementById('result-overlay').classList.remove('show'); }
function handleResultBtn() {
  if (resultAction === 'next') { hideResult(); setTimeout(startBattle, 350); }
}

function showFinalScreen(won) {
  const wins  = battleScores.filter(b => b.won).length;
  const stars = wins >= 5 ? '⭐⭐⭐' : wins >= 3 ? '⭐⭐' : wins >= 1 ? '⭐' : '💀';
  document.getElementById('final-title').textContent = won ? '🏆 CAMPEÃO!' : '💀 FIM DO TORNEIO';
  document.getElementById('final-title').style.color = won ? '#f5c518' : '#ef4444';
  document.getElementById('final-stars').textContent = stars;
  document.getElementById('final-score-big').textContent = totalScore + ' PTS';
  document.getElementById('final-stats').innerHTML = battleScores.map((b,i) => `
    <div class="final-stat-row">
      <span class="${b.won?'won-mark':'lost-mark'}">${b.won?'✅':'❌'} Batalha ${i+1}: ${b.enemy}</span>
      <span>${b.score>0?'+'+b.score+' PTS':'--'}</span>
    </div>`).join('');
  if (hallOfFame.length > 0) {
    document.getElementById('final-hall').innerHTML = '🏅 DERROTADOS:<br>' + hallOfFame.join(' · ');
  }
  document.getElementById('final-overlay').classList.add('show');
}

// ═══════════════════════════════════════
//  RUN
// ═══════════════════════════════════════
async function tryRun() {
  if (!playerTurn || tournamentOver) return;
  playerTurn = false; toggleMainActions(false);
  const chance = 0.25 + (p1.speed / (p1.speed + p2.speed)) * 0.55;
  if (Math.random() > chance) {
    await log(`${p1.name} não conseguiu fugir!`, 1200);
    playerTurn = true; toggleMainActions(true);
  } else {
    await log(`Você fugiu da batalha!`, 1200);
    await handleLoss();
  }
}

// ═══════════════════════════════════════
//  MOVES RENDER
// ═══════════════════════════════════════
function renderMoves() {
  const div = document.getElementById('moves');
  if (!p1) return;
  div.innerHTML = '';
  p1.moves.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'move-btn';
    const color = typeColors[m.type] || '#a0a0a0';
    const cat   = m.damageClass === 'special' ? '🌀' : m.damageClass === 'physical' ? '⚔' : '✦';
    const ppClass = m.pp <= 2 ? 'move-pp low' : 'move-pp';
    btn.innerHTML = `
      <div class="move-type-bar" style="background:${color}"></div>
      <div class="move-btn-inner">
        <span class="move-name">${m.name}</span>
        <div class="move-meta">
          <div class="move-type-dot" style="background:${color}"></div>
          <span class="move-cat">${cat}</span>
          <span class="${ppClass}">${m.pp}/${m.maxPP}</span>
          ${m.power ? `<span class="move-pow">POW ${m.power}</span>` : ''}
          <span class="move-key">[${i+1}]</span>
        </div>
      </div>`;
    btn.disabled = !playerTurn;
    btn.onclick  = () => playTurn(i);
    div.appendChild(btn);
  });
}

function toggleMainActions(on) {
  ['btn-fight','btn-bag','btn-run'].forEach(id => {
    document.getElementById(id).disabled = !on;
  });
  document.querySelectorAll('.move-btn').forEach(b => b.disabled = !on);
}

// ═══════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════
function getTournamentData() {
  try { return JSON.parse(localStorage.getItem('pkmnTournamentV3')||'{}'); } catch { return {}; }
}
function saveTournament(win) {
  const today = new Date().toDateString();
  const data  = getTournamentData();
  if (!data[today]) data[today] = { wins:0, battles:0, bestScore:0 };
  data[today].battles++;
  if (win) data[today].wins++;
  if (totalScore > (data[today].bestScore||0)) data[today].bestScore = totalScore;
  localStorage.setItem('pkmnTournamentV3', JSON.stringify(data));
  updateTournamentPips();
}
function updateTournamentPips() {
  for (let i = 1; i <= maxBattles; i++) {
    const pip = document.getElementById(`pip${i}`);
    if (!pip) continue;
    pip.classList.remove('won','lost','current');
    if (i < battleNumber) {
      const b = battleScores[i-1];
      pip.classList.add(b?.won ? 'won' : 'lost');
    } else if (i === battleNumber && !tournamentOver) {
      pip.classList.add('current');
    }
  }
  document.getElementById('boss-label').textContent =
    battleNumber === maxBattles && !tournamentOver ? '← CHEFE!' : '';
}

// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = rng(0, i); [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ═══════════════════════════════════════
//  START BATTLE
// ═══════════════════════════════════════
async function startBattle() {
  playerTurn = false; showMainMenu();

  const loadOv = document.getElementById('loading-overlay');
  loadOv.style.opacity = '1'; loadOv.style.display = 'flex';

  ['sprite1','sprite2'].forEach(id => {
    const el = document.getElementById(id);
    el.className = 'sprite'; el.style.opacity = '1'; el.style.transform = '';
  });
  document.getElementById('textbox').innerHTML = 'Procurando oponente...<span id="cursor"></span>';
  document.getElementById('moves').innerHTML = '';
  toggleMainActions(false);

  // Weather – 40% clear, 60% some weather
  const rawW = Math.random() < 0.40 ? 'none' : WEATHERS[rng(1, WEATHERS.length-1)];
  setWeather(rawW);

  // Difficulty
  const bIdx  = Math.min(battleNumber-1, diffMult.length-1);
  const eMult = diffMult[bIdx];
  const eLvl  = enemyLvls[bIdx];

  // Pokémon IDs: Gen I–III (1–386)
  const id1 = rng(1, 386);
  let id2   = rng(1, 386);
  while (id2 === id1) id2 = rng(1, 386);

  document.getElementById('loading-text').textContent = isBoss()
    ? '⚠️ CARREGANDO CHEFE...' : 'CARREGANDO POKÉMON...';

  [p1, p2] = await Promise.all([
    getPokemon(id1, 1.0, PLAYER_LVL),
    getPokemon(id2, eMult, eLvl)
  ]);
  p1.spriteId = 'sprite1'; p2.spriteId = 'sprite2';

  loadOv.style.opacity = '0';
  setTimeout(() => { loadOv.style.display = 'none'; }, 500);

  document.getElementById('p1name').textContent = p1.name;
  document.getElementById('p2name').textContent = p2.name;
  setTypeBadges(p1, 1);
  setTypeBadges(p2, 2);

  const s1 = document.getElementById('sprite1');
  const s2 = document.getElementById('sprite2');
  s1.src = p1.spriteBack;
  s2.src = p2.spriteFront;

  if (isBoss()) {
    s2.classList.add('anim-boss-enter');
    setTimeout(() => s2.classList.remove('anim-boss-enter'), 600);
  } else {
    s2.classList.add('anim-enter-enemy');
    setTimeout(() => s2.classList.remove('anim-enter-enemy'), 600);
  }
  s1.classList.add('anim-enter-player');
  setTimeout(() => { s1.classList.remove('anim-enter-player'); s1.classList.add('anim-float'); }, 600);

  updateStatusBadge(p1,1); updateStatusBadge(p2,2);
  updateBothHP();
  renderMoves();
  updateTournamentPips();

  try { new Audio(p2.cry).play().catch(()=>{}); } catch {}

  if (isBoss()) {
    await flashScreen('rgba(168,85,247,0.4)');
    await typeText(`⚠️ CHEFE! Um ${p2.name} poderoso apareceu!`);
  } else {
    await typeText(`Um ${p2.name} selvagem apareceu!`);
  }

  if (currentWeather !== 'none') {
    await log(`${W_NAMES[currentWeather]} começou!`, 1100);
  }
  try { new Audio(p1.cry).play().catch(()=>{}); } catch {}
  await log(`Vai, ${p1.name}!`);
  await log(`O que ${p1.name} deve fazer?`, 700);

  playerTurn = true; toggleMainActions(true);
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
updateTournamentPips();
startBattle();
</script>
